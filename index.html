<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axon Explorer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { color: #333; }
    .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
    input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 8px 16px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0055aa; }
    .section { margin-bottom: 24px; }
    .section h2 { border-bottom: 1px solid #eee; padding-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
    .mono { font-family: monospace; word-break: break-all; }
    .value { color: #0066cc; }
    .error { color: red; }
    #blockNumber { font-size: 0.9em; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Axon Explorer</h1>
    <div id="blockNumber">Loading block...</div>

    <div class="search-box">
      <input type="text" id="query" placeholder='Block number, tx hash, or address (0x...)'>
      <button onclick="search()">Search</button>
    </div>

    <div id="result"></div>

    <div class="section">
      <h2>Latest Blocks</h2>
      <table id="blocksTable">
        <thead><tr><th>#</th><th>Hash</th><th>Time</th><th>Txs</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const RPC = 'https://mainnet-rpc.axonchain.ai/';

    async function rpc(method, params = []) {
      const res = await fetch(RPC, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.result;
    }

    function formatHex(hex) { return hex || ''; }
    function hexToNum(hex) { return parseInt(hex || '0x0', 16); }
    function weiToAxon(wei) { return (Number(wei) / 1e18).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 6}); }

    async function loadLatestBlocks() {
      try {
        const blockNumHex = await rpc('eth_blockNumber');
        const blockNum = hexToNum(blockNumHex);
        document.getElementById('blockNumber').textContent = `Current block: ${blockNum}`;

        const tbody = document.querySelector('#blocksTable tbody');
        tbody.innerHTML = '';
        for (let i = Math.max(blockNum - 10, 0); i <= blockNum; i++) {
          const block = await rpc('eth_getBlockByNumber', ['0x' + i.toString(16), false]);
          if (!block) continue;
          const time = new Date(Number(block.timestamp) * 1000).toLocaleString();
          tbody.innerHTML += `<tr>
            <td class="mono">${i}</td>
            <td class="mono">${block.hash.slice(0, 16)}...</td>
            <td>${time}</td>
            <td>${block.transactions.length}</td>
          </tr>`;
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function search() {
      const query = document.getElementById('query').value.trim();
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = 'Searching...';
      if (!query) return;
      try {
        if (query.startsWith('0x') && query.length === 66) {
          // Assume tx hash or block hash (66 chars)
          const tx = await rpc('eth_getTransactionByHash', [query]);
          if (tx) {
            resultDiv.innerHTML = `<h2>Transaction</h2>
              <table>
                <tr><th>Hash</th><td class="mono">${tx.hash}</td></tr>
                <tr><th>Block</th><td class="mono">${tx.blockNumber ? weiToAxon(tx.blockNumber) : 'Pending'}</td></tr>
                <tr><th>From</strong></td><td class="mono value">${tx.from}</td></tr>
                <tr><th>To</td><td class="mono value">${tx.to || 'Contract Creation'}</td></tr>
                <tr><th>Value (AXON)</td><td>${weiToAxon(tx.value)}</td></tr>
                <tr><th>Gas</th><td>limit: ${tx.gas}, used: ${tx.gasUsed || 'n/a'}</td></tr>
              </table>`;
            return;
          }
          const block = await rpc('eth_getBlockByHash', [query, true]);
          if (block) {
            resultDiv.innerHTML = `<h2>Block</h2>
              <table>
                <tr><th>Number</th><td class="mono">${weiToAxon(block.number)}</td></tr>
                <tr><th>Hash</th><td class="mono">${block.hash}</td></tr>
                <tr><th>Timestamp</th><td>${new Date(Number(block.timestamp)*1000).toLocaleString()}</td></tr>
                <tr><th>Transactions</th><td>${block.transactions.length}</td></tr>
                <tr><th>Gas Used</th><td>${weiToAxon(block.gasUsed)}</td></tr>
                <tr><th>Miner</th><td class="mono">${block.miner}</td></tr>
              </table>`;
            return;
          }
        } else if (/^0x[0-9a-fA-F]{40}$/.test(query)) {
          // Address
          const balWei = await rpc('eth_getBalance', [query, 'latest']);
          const bal = weiToAxon(balWei);
          const code = await rpc('eth_getCode', [query, 'latest']);
          const isContract = code && code !== '0x';
          resultDiv.innerHTML = `<h2>Address</h2>
            <table>
              <tr><th>Address</th><td class="mono value">${query}</td></tr>
              <tr><th>Balance (AXON)</th><td>${bal}</td></tr>
              <tr><th>Contract</th><td>${isContract ? 'Yes' : 'No (EOA)'}</td></tr>
            </table>`;
          return;
        } else if (!isNaN(query)) {
          const block = await rpc('eth_getBlockByNumber', ['0x' + BigInt(query).toString(16), false]);
          if (block) {
            resultDiv.innerHTML = `<h2>Block</h2>
              <table>
                <tr><th>Number</th><td class="mono">${weiToAxon(block.number)}</td></tr>
                <tr><th>Hash</th><td class="mono">${block.hash}</td></tr>
                <tr><th>Timestamp</th><td>${new Date(Number(block.timestamp)*1000).toLocaleString()}</td></tr>
                <tr><th>Transactions</th><td>${block.transactions.length}</td></tr>
                <tr><th>Gas Used</th><td>${weiToAxon(block.gasUsed)}</td></tr>
                <tr><th>Miner</th><td class="mono">${block.miner}</td></tr>
              </table>`;
            return;
          }
        }
        resultDiv.innerHTML = '<p class="error">Not found or invalid input.</p>';
      } catch (e) {
        resultDiv.innerHTML = `<p class="error">Error: ${e.message}</p>`;
      }
    }

    // Initial load
    loadLatestBlocks();
    setInterval(loadLatestBlocks, 15000); // every 15s
  </script>
</body>
</html>
